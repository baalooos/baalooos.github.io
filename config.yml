baseURL: 'https://baalooos.me/'
locale: fr
title: 'Le blog de Baalooos'
enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
mainsections: ["posts"]

minify:
  disableXML: true

taxonomies:
  tag: tags
  category: categories
  series: series

params:
  author:
    name: Baalooos

  rtwt:
    sidePane: true
    sidePaneSticky: true
    showTableOfContents: true
    showRelated: true
    showRecent: true
    countRecent: 5
    side:
      home:
        taxonomies: ["tags", "categories"]
        countTaxonomy: 10

menu:
  main:
  - identifier: about
    name: About me
    url: /about/
    weight: 1
  - identifier: posts
    name: Posts
    url: /posts/
    weight: 2
  - identifier: archives
    name: Archives
    url: /archives/
    weight: 3
  - identifier: search
    name: Search
    url: /search/
    weight: 4

outputs:
  home:
  - HTML
  - RSS

module:
  imports:
    - path: github.com/martignoni/hugo-notice
    - path: github.com/math-queiroz/rusty-typewriter

baseURL: 'https://baalooos.me/'
locale: fr
title: 'Le blog de Baalooos'
enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
mainsections: ["posts"]

minify:
  disableXML: true

taxonomies:
  tag: tags
  category: categories
  series: series

params:
  author:
    name: Baalooos

  rtwt:
    searchPath: /search
    sidePane: true
    sidePaneSticky: true
    home:
      showBio: true
      showAuthorImg: true
      showRecent: true
      countRecent: 5
    side:
      home:
        taxonomies: ["categories", "tags"]
        countTaxonomy: 10
      single:
        showDetails: true
        showTableOfContents: true
        showRelated: false
        showAttachments: false

menu:
  main:
  - identifier: about
    name: About me
    url: /about/
    weight: 1
  - identifier: posts
    name: Posts
    url: /posts/
    weight: 2
  - identifier: archives
    name: Archives
    url: /posts/
    weight: 3
  - identifier: search
    name: Search
    url: /search/
    weight: 4

outputFormats:
  SearchIndex:
    mediaType: application/json
    baseName: searchindex
    isPlainText: true
    notAlternative: true

mediaTypes:
  "application/json":
    suffixes: ["json"]

outputs:
  home:
  - HTML
  - RSS
  - SearchIndex

module:
  imports:
    - path: github.com/martignoni/hugo-notice
    - path: github.com/math-queiroz/rusty-typewriter
